<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta http-equiv="Content-Security-Policy" content="default-src 'self' 'unsafe-inline' 'unsafe-eval' https://*.supabase.co https://cdnjs.cloudflare.com https://cdn.jsdelivr.net https://fonts.googleapis.com https://fonts.gstatic.com wss://*.supabase.co data: blob:;">
<meta name="referrer" content="same-origin">
<meta name="robots" content="noindex, nofollow">
<title>ALU SPACE — Gestion de Facturation</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text x='50' y='68' font-size='60' text-anchor='middle'>🏢</text></svg>">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.39.0/dist/umd/supabase.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.8.2/jspdf.plugin.autotable.min.js"></script>
<link rel="stylesheet" href="styles.css">
</head>
<body>

<!-- ==================== LOADING ==================== -->
<div id="loading-screen" style="position:fixed;inset:0;background:#0F1E36;display:flex;align-items:center;justify-content:center;z-index:9999;">
  <div style="color:white;font-family:Inter,sans-serif;text-align:center">
    <div class="spinner" style="width:40px;height:40px;border:3px solid rgba(255,255,255,0.2);border-top-color:white;border-radius:50%;margin:0 auto 16px;animation:spin 0.8s linear infinite"></div>
    <div style="font-size:14px;opacity:0.8">Chargement...</div>
  </div>
</div>
<style>@keyframes spin{to{transform:rotate(360deg)}}</style>

<!-- ==================== AUTH (Login / Signup) ==================== -->
<div id="auth-screen" style="display:none;">
  <div class="auth-bg"></div>
  <div class="login-card">
    <div class="login-logo">
      <div class="emblem"><span class="logo-text-fallback">ALU SPACE</span></div>
      <h1>ALU SPACE</h1>
      <p>Gestion de Facturation · Menuiserie Aluminium</p>
    </div>
    <div id="login-form">
      <div class="field">
        <label>Email</label>
        <input type="email" id="login-email" autocomplete="username">
      </div>
      <div class="field">
        <label>Mot de passe</label>
        <input type="password" id="login-password" autocomplete="current-password">
      </div>
      <button class="btn btn-primary btn-block btn-lg" onclick="doLogin()">Se connecter</button>
      <div class="auth-msg auth-err" id="login-error"></div>
    </div>
  </div>
</div>

<!-- ==================== MAIN APP ==================== -->
<div id="app" style="display:none;">
  <aside class="sidebar">
    <div class="sidebar-header">
      <div class="emblem"><span class="logo-text-fallback">ALU SPACE</span></div>
      <div>
        <div class="brand" id="sidebar-company-name">ALU SPACE</div>
        <div class="sub" id="sidebar-ws-name">Facturation</div>
      </div>
    </div>
    <nav class="nav">
      <div class="nav-item active" data-view="dashboard">
        <svg class="ico" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"/></svg>
        Tableau de bord
      </div>
      <div class="nav-item" data-view="invoices">
        <svg class="ico" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"/></svg>
        Factures
      </div>
      <div class="nav-item" data-view="clients">
        <svg class="ico" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M17 20h5v-2a3 3 0 00-5.356-1.857M17 20H7m10 0v-2c0-.656-.126-1.283-.356-1.857M7 20H2v-2a3 3 0 015.356-1.857M7 20v-2c0-.656.126-1.283.356-1.857m0 0a5.002 5.002 0 019.288 0M15 7a3 3 0 11-6 0 3 3 0 016 0zm6 3a2 2 0 11-4 0 2 2 0 014 0zM7 10a2 2 0 11-4 0 2 2 0 014 0z"/></svg>
        Clients
      </div>
      <div class="nav-item" data-view="products">
        <svg class="ico" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M20 7l-8-4-8 4m16 0l-8 4m8-4v10l-8 4m0-10L4 7m8 4v10M4 7v10l8 4"/></svg>
        Produits / Stock
      </div>
      <div class="nav-item" data-view="stats">
        <svg class="ico" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M9 19v-6a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2a2 2 0 002-2zm0 0V9a2 2 0 012-2h2a2 2 0 012 2v10m-6 0a2 2 0 002 2h2a2 2 0 002-2m0 0V5a2 2 0 012-2h2a2 2 0 012 2v14a2 2 0 01-2 2h-2a2 2 0 01-2-2z"/></svg>
        Statistiques
      </div>
      <div class="nav-item" data-view="audit">
        <svg class="ico" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2m-6 9l2 2 4-4"/></svg>
        Journal d'activité
      </div>
      <div class="nav-item" data-view="settings">
        <svg class="ico" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z"/><path stroke-linecap="round" stroke-linejoin="round" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/></svg>
        Paramètres
      </div>
    </nav>
    <div class="sidebar-footer">
      <div class="avatar" id="user-avatar">U</div>
      <div class="user-info">
        <div class="name" id="user-name">Utilisateur</div>
        <div class="role" id="user-role">—</div>
      </div>
      <button class="logout-btn" onclick="doLogout()" title="Déconnexion">
        <svg width="18" height="18" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"/></svg>
      </button>
    </div>
  </aside>

  <main class="main">
    <div class="topbar">
      <button class="mobile-menu-btn" onclick="toggleMobileMenu()">☰</button>
      <h1 id="page-title">Tableau de bord</h1>
      <div class="actions" id="page-actions"></div>
    </div>
    <div class="content" id="content"></div>
  </main>
</div>

<!-- Modal container -->
<div class="modal-backdrop" id="modal-backdrop">
  <div class="modal" id="modal-content"></div>
</div>

<!-- Toast container -->
<div class="toasts" id="toasts"></div>

<!-- App scripts -->
<script src="config.js"></script>
<script src="js/01-utils.js"></script>
<script src="js/02-num2words.js"></script>
<script src="js/03-state.js"></script>
<script src="js/04-auth.js"></script>
<script src="js/05-audit.js"></script>
<script src="js/06-data.js"></script>
<script src="js/07-nav.js"></script>
<script src="js/10-view-dashboard.js"></script>
<script src="js/11-view-invoices-list.js"></script>
<script src="js/12-view-invoice-editor.js"></script>
<script src="js/13-view-clients.js"></script>
<script src="js/14-view-products.js"></script>
<script src="js/15-view-stats.js"></script>
<script src="js/16-view-audit.js"></script>
<script src="js/17-view-settings.js"></script>
<script src="js/20-pdf-generator.js"></script>
<script>boot();</script>

<div id="sidebar-backdrop"></div>
</body>
</html>
